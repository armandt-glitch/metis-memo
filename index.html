    <meta name="theme-color" content="#8B1A1A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Métis Memo" />
    
    <!-- PWA Icons -->
    <link rel="icon" type="image/png" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />

    <meta property="og:title" content="Métis Memo - Mémorisation intelligente" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>

  <body>
    <div id="root">
      <!-- Loading screen shown before React loads -->
      <div id="loading-screen" style="
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 24px;
        background: linear-gradient(180deg, hsl(0 40% 97%), hsl(40 33% 99%));
      ">
        <img src="/pwa-192x192.png" alt="Métis Memo" style="width: 64px; height: 64px; opacity: 0.9;" />
        <div style="
          width: 32px;
          height: 32px;
          border: 3px solid hsl(0 70% 90%);
          border-top-color: hsl(0 70% 45%);
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
        "></div>
      </div>
      <style>
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
        #loading-screen {
          transition: opacity 0.3s ease-out;
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
